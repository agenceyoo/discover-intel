<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Discover Intel{% endblock %} - Google Discover France</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .sidebar-link.active { background-color: rgba(99, 102, 241, 0.2); color: #818cf8; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="h-full bg-gray-50">
    <div class="flex h-full">
        <!-- Sidebar -->
        <aside class="w-64 bg-slate-800 text-gray-300 flex flex-col flex-shrink-0 fixed h-full z-10">
            <div class="p-5 border-b border-slate-700">
                <h1 class="text-xl font-bold text-white tracking-tight">Discover Intel</h1>
                <p class="text-xs text-slate-400 mt-1">Veille Google Discover France</p>
            </div>
            <nav class="flex-1 py-4 px-3 space-y-1 overflow-y-auto">
                <a href="/" class="sidebar-link flex items-center px-3 py-2.5 rounded-lg text-sm font-medium hover:bg-slate-700 transition {{ 'active' if request.endpoint == 'dashboard.index' }}">
                    <svg class="w-5 h-5 mr-3 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
                    Dashboard
                </a>
                <a href="/trends" class="sidebar-link flex items-center px-3 py-2.5 rounded-lg text-sm font-medium hover:bg-slate-700 transition {{ 'active' if request.endpoint and 'trends' in request.endpoint }}">
                    <svg class="w-5 h-5 mr-3 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg>
                    Tendances
                </a>
                <a href="/stories" class="sidebar-link flex items-center px-3 py-2.5 rounded-lg text-sm font-medium hover:bg-slate-700 transition {{ 'active' if request.endpoint and 'stories' in request.endpoint }}">
                    <svg class="w-5 h-5 mr-3 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"/></svg>
                    Top Stories
                </a>
                <a href="/publishers" class="sidebar-link flex items-center px-3 py-2.5 rounded-lg text-sm font-medium hover:bg-slate-700 transition {{ 'active' if request.endpoint and 'publishers' in request.endpoint }}">
                    <svg class="w-5 h-5 mr-3 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
                    Editeurs
                </a>
                <a href="/categories" class="sidebar-link flex items-center px-3 py-2.5 rounded-lg text-sm font-medium hover:bg-slate-700 transition {{ 'active' if request.endpoint and 'categories' in request.endpoint }}">
                    <svg class="w-5 h-5 mr-3 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A2 2 0 013 12V7a4 4 0 014-4z"/></svg>
                    Categories
                </a>
                <a href="/content" class="sidebar-link flex items-center px-3 py-2.5 rounded-lg text-sm font-medium hover:bg-slate-700 transition {{ 'active' if request.endpoint and 'content' in request.endpoint }}">
                    <svg class="w-5 h-5 mr-3 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                    Formats
                </a>
                <a href="/historical" class="sidebar-link flex items-center px-3 py-2.5 rounded-lg text-sm font-medium hover:bg-slate-700 transition {{ 'active' if request.endpoint and 'historical' in request.endpoint }}">
                    <svg class="w-5 h-5 mr-3 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    Historique
                </a>
            </nav>
            <div class="p-4 border-t border-slate-700 text-xs text-slate-500">
                <div id="collection-status">Chargement statut...</div>
            </div>
        </aside>

        <!-- Main content -->
        <main class="flex-1 ml-64 p-6 overflow-y-auto">
            {% block content %}{% endblock %}
        </main>
    </div>

    <script>
        // Charger le statut des collecteurs
        fetch('/api/collection/status')
            .then(r => r.json())
            .then(json => {
                const el = document.getElementById('collection-status');
                const d = json.data;
                let html = '';
                for (const [key, val] of Object.entries(d)) {
                    const dot = val.status === 'success' ? 'bg-green-400' : val.status === 'running' ? 'bg-yellow-400' : val.status === 'failed' ? 'bg-red-400' : 'bg-gray-400';
                    const time = val.finished_at ? new Date(val.finished_at).toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'}) : '-';
                    html += `<div class="flex items-center gap-2 mb-1"><span class="w-2 h-2 rounded-full ${dot}"></span><span>${key}</span><span class="ml-auto">${time}</span></div>`;
                }
                el.innerHTML = html || 'Aucune collecte';
            })
            .catch(() => {
                document.getElementById('collection-status').textContent = 'Erreur chargement';
            });
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
